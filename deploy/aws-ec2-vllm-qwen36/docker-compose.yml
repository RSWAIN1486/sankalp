services:
  vllm:
    image: vllm/vllm-openai:v0.20.1
    restart: unless-stopped
    ipc: host
    ports:
      - "8000:8000"
    volumes:
      - "${HOME}/.cache/huggingface:/root/.cache/huggingface"
    environment:
      HF_TOKEN: "${HF_TOKEN:-}"
      VLLM_API_KEY: "${VLLM_API_KEY:?set VLLM_API_KEY in .env}"
      VLLM_NO_USAGE_STATS: "1"
      VLLM_ENABLE_CUDA_COMPATIBILITY: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - "--model"
      - "${MODEL_ID:-Qwen/Qwen3.6-27B-FP8}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--served-model-name"
      - "${SERVED_MODEL_NAME:-Qwen/Qwen3.6-27B-FP8}"
      - "--trust-remote-code"
      - "--dtype"
      - "auto"
      - "--max-model-len"
      - "${MAX_MODEL_LEN:-32768}"
      - "--gpu-memory-utilization"
      - "${GPU_MEMORY_UTILIZATION:-0.90}"
      - "--kv-cache-dtype"
      - "${KV_CACHE_DTYPE:-fp8}"
      - "--max-num-seqs"
      - "${MAX_NUM_SEQS:-1}"
      - "--max-num-batched-tokens"
      - "${MAX_NUM_BATCHED_TOKENS:-8192}"
      - "--enable-prefix-caching"
      - "--reasoning-parser"
      - "qwen3"
      - "--api-key"
      - "${VLLM_API_KEY}"
